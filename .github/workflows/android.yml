name: Android CI — QuestPhone
on:
  push:
    branches: [ "main", "master" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build Universal Debug APK
      run: |
        # Try fdroid universal debug first, fallback to plain debug
        ./gradlew assembleFdroidDebug \
          -Pandroid.injected.build.abi="" \
          2>/dev/null || \
        ./gradlew assembleDebug \
          -Pandroid.injected.build.abi="" \
          2>/dev/null || \
        ./gradlew assembleDebug

    - name: Find and rename APK
      run: |
        # Find the universal or largest APK (universal is biggest)
        APK=$(find . -name "*.apk" -not -path "*/test*" | xargs ls -S 2>/dev/null | head -n 1)
        echo "Found APK: $APK"
        cp "$APK" QuestPhone_debug_universal.apk
        echo "APK_FILE=QuestPhone_debug_universal.apk" >> $GITHUB_ENV
        # Print APK info
        echo "APK size: $(du -sh $APK | cut -f1)"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: QuestPhone-debug-universal
        path: ${{ env.APK_FILE }}
        retention-days: 90
