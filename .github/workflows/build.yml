name: QuestPhone CI
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Keystore & local.properties
        env:
          KEYSTORE_B64:       ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD:  ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
        run: |
          mkdir -p app
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > app/questphone_release.jks
          else
            keytool -genkeypair -alias "${KEY_ALIAS:-questphone}" -keyalg RSA -keysize 2048 \
              -validity 10000 -keystore app/questphone_release.jks \
              -storepass "${KEYSTORE_PASSWORD:-QuestPhone2025}" -keypass "${KEY_PASSWORD:-QuestPhone2025}" \
              -dname "CN=QuestPhone,O=Krishna,C=IN" -noprompt
          fi
          printf "KEYSTORE_FILE=questphone_release.jks\nKEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}\nKEY_ALIAS=${KEY_ALIAS}\nKEY_PASSWORD=${KEY_PASSWORD}\n" >> local.properties

      - name: Build Release APK
        run: chmod +x gradlew && ./gradlew assembleFdroidRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuestPhone-${{ github.run_number }}
          path: app/build/outputs/apk/fdroid/release/*.apk
          retention-days: 30

      # Only runs when commit message starts with "release:"
      - name: Check if release commit
        id: check
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if [[ "$MSG" == release:* ]]; then
            echo "do_release=true" >> $GITHUB_OUTPUT
          else
            echo "do_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Get version info
        id: version
        if: steps.check.outputs.do_release == 'true'
        run: |
          CODE=$(grep 'versionCode' app/build.gradle.kts | grep -o '[0-9]*' | head -1)
          NAME=$(grep 'versionName' app/build.gradle.kts | grep -o '".*"' | tr -d '"' | head -1)
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "tag=v$NAME-$CODE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: release
        if: steps.check.outputs.do_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: QuestPhone v${{ steps.version.outputs.name }}
          body: ${{ github.event.head_commit.message }}
          files: app/build/outputs/apk/fdroid/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Render server
        if: steps.check.outputs.do_release == 'true'
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          APK_URL=$(echo '${{ steps.release.outputs.assets }}' | python3 -c "
          import sys, json
          assets = json.load(sys.stdin)
          apk = next((a for a in assets if a['name'].endswith('.apk')), None)
          print(apk['browser_download_url'] if apk else '')
          ")
          curl -sf -X POST "$RENDER_URL/notify-update" \
            -H "Content-Type: application/json" \
            -H "x-sync-token: $SYNC_TOKEN" \
            -d "{\"versionCode\":${{ steps.version.outputs.code }},\"versionName\":\"${{ steps.version.outputs.name }}\",\"downloadUrl\":\"$APK_URL\",\"changelog\":\"${{ github.event.head_commit.message }}\"}"
