name: QuestPhone CI
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release:
        description: 'Create release and notify Render'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Keystore & local.properties
        env:
          KEYSTORE_B64:       ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD:  ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
        run: |
          mkdir -p app
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > app/questphone_release.jks
          else
            keytool -genkeypair -alias "${KEY_ALIAS:-questphone}" -keyalg RSA -keysize 2048 \
              -validity 10000 -keystore app/questphone_release.jks \
              -storepass "${KEYSTORE_PASSWORD:-QuestPhone2025}" -keypass "${KEY_PASSWORD:-QuestPhone2025}" \
              -dname "CN=QuestPhone,O=Krishna,C=IN" -noprompt
          fi
          printf "KEYSTORE_FILE=questphone_release.jks\nKEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}\nKEY_ALIAS=${KEY_ALIAS}\nKEY_PASSWORD=${KEY_PASSWORD}\n" >> local.properties

      - name: Build Release APK
        run: chmod +x gradlew && ./gradlew assembleFdroidRelease

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuestPhone-${{ github.run_number }}
          path: app/build/outputs/apk/fdroid/release/*.apk
          retention-days: 30

      - name: Get version info
        if: github.event.inputs.release == 'true'
        id: version
        run: |
          CODE=$(grep 'versionCode' app/build.gradle.kts | grep -o '[0-9]*' | head -1)
          NAME=$(grep 'versionName' app/build.gradle.kts | grep -o '".*"' | tr -d '"' | head -1)
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "tag=v$NAME-$CODE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event.inputs.release == 'true'
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: QuestPhone v${{ steps.version.outputs.name }}
          body: "Build #${{ github.run_number }}"
          files: app/build/outputs/apk/fdroid/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Render
        if: github.event.inputs.release == 'true'
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_URL=$(curl -sf -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.version.outputs.tag }}" \
            | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          a=next((x for x in d.get('assets',[]) if x['name'].endswith('.apk')),None)
          print(a['browser_download_url'] if a else '')
          ")
          curl -sf -X POST "$RENDER_URL/notify-update" \
            -H "Content-Type: application/json" \
            -H "x-sync-token: $SYNC_TOKEN" \
            -d "{\"versionCode\":${{ steps.version.outputs.code }},\"versionName\":\"${{ steps.version.outputs.name }}\",\"downloadUrl\":\"$APK_URL\",\"changelog\":\"Build #${{ github.run_number }}\"}" \
            && echo "✅ Render notified" || echo "❌ Render notify failed"
