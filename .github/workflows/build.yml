name: Android CI — The Indie Revers
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build Release APK
      run: chmod +x gradlew && ./gradlew assembleFdroidRelease
    - name: Sign APK
      run: |
        APK=$(find . -path "*fdroid*release*.apk" 2>/dev/null | grep -v unsigned | head -n 1)
        [ -z "$APK" ] && APK=$(find . -name "*.apk" | head -n 1)
        if [ -n "${{ secrets.KEYSTORE_B64 }}" ]; then
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > ks.jks
          jarsigner -verbose -keystore ks.jks \
            -storepass "${{ secrets.STORE_PASS }}" \
            -keypass "${{ secrets.KEY_PASS }}" \
            -signedjar QuestPhone_IndieRevers_signed.apk "$APK" questphone
          echo "APK_FILE=QuestPhone_IndieRevers_signed.apk" >> $GITHUB_ENV
        else
          cp "$APK" QuestPhone_IndieRevers_debug.apk
          echo "APK_FILE=QuestPhone_IndieRevers_debug.apk" >> $GITHUB_ENV
        fi
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: QuestPhone-IndieRevers
        path: ${{ env.APK_FILE }}
